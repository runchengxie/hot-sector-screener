# Daily completed-EOD hotspot universe build
# Run: uv run hotsector run --config configs/experiments/daily_eod.yml

market: a_share

hotspot_sources:
  - ths_hot
  - dc_concept
  - kpl_concept

llm:
  enabled: true
  model: deepseek-reasoner
  prompt_template: default

universe:
  max_candidates: 100
  min_candidates: 50
  min_daily_amount_rank_pct: 85
  max_price: 200.0
  min_price: 3.0
  max_st_allow: false
  topics_per_run: 5
  stocks_per_topic: 25

output:
  format: csv
  publish: false
