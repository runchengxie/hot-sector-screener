# hot-sector-screener default config
# Edit this file directly to customise.

market: a_share

hotspot_sources:
  - ths_hot
  - dc_concept
  - kpl_concept

llm:
  enabled: true
  model: deepseek-reasoner
  provider: deepseek
  prompt_template: default

universe:
  max_candidates: 100
  min_candidates: 30
  min_daily_amount_rank_pct: 80
  max_price: 200.0
  min_price: 2.0
  max_st_allow: false
  topics_per_run: 5
  stocks_per_topic: 25
  hotspot_feature_overlay: true
  hotspot_feature_weight: 0.25
  daily_confirmation_enabled: true
  daily_confirmation_weight: 0.20
  daily_confirmation_lookback: 20
  min_daily_confirmation_score:
  confidence_enabled: true

output:
  format: csv
  publish: false
  export_signals: true
  signal_model_version: hotsector-theme-v2
  signal_feature_set_id: topic-concept-hotspot-overlay
  eligible_for_live: true

# Optional: path to rotation-v3 industry-signal output
# rotation_signal_dir: /home/richard/data/market-data-platform/strategy_outputs/etf_rotation_v3/latest
