name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hot-sector-screener
    steps:
      - uses: actions/checkout@v4
        with:
          path: hot-sector-screener
      - name: Check out factor core
        uses: actions/checkout@v4
        with:
          repository: runchengxie/a-share-factor-core
          ref: main
          path: a-share-factor-core
          token: ${{ secrets.A_SHARE_FACTOR_CORE_READ_TOKEN || github.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run tests
        run: uv run --extra dev python -m pytest

  quality-preview:
    name: Lint and Type Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hot-sector-screener
    steps:
      - uses: actions/checkout@v4
        with:
          path: hot-sector-screener
      - name: Check out factor core
        uses: actions/checkout@v4
        with:
          repository: runchengxie/a-share-factor-core
          ref: main
          path: a-share-factor-core
          token: ${{ secrets.A_SHARE_FACTOR_CORE_READ_TOKEN || github.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Ruff format check
        run: uv run --extra dev ruff format --check .
      - name: Ruff lint
        run: uv run --extra dev ruff check .
      - name: Pyright
        continue-on-error: true
        run: uv run --extra dev pyright
