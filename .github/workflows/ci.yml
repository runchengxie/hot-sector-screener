name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.A_SHARE_FACTOR_CORE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run tests
        run: uv run --extra dev python -m pytest

  quality-preview:
    name: Lint and Type Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Init submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.A_SHARE_FACTOR_CORE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Ruff format check
        run: uv run --extra dev ruff format --check .
      - name: Ruff lint
        run: uv run --extra dev ruff check .
      - name: Pyright
        continue-on-error: true
        run: uv run --extra dev pyright
